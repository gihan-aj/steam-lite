name: Release

# Triggers when you push a version tag like v0.1.0, v1.2.3
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write   # needed to create GitHub Releases

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''

          # Uncomment when you want macOS/Linux builds:
          # - platform: macos-latest
          #   args: '--target aarch64-apple-darwin,x86_64-apple-darwin'
          # - platform: ubuntu-22.04
          #   args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      # Ubuntu only — Tauri needs these system libraries
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}        # e.g. v0.1.0
          releaseName: '${{ github.ref_name }}'
          releaseBody: |
            See the release notes for what changed in this version.
          releaseDraft: true     # creates as draft — you review before publishing
          prerelease: false
          includeUpdaterJson: true   # automatically generates latest.json